# ------------------------- 基础配置 -------------------------
pretrained_model: "D:/ProjectAll/yolov8/models/yolov8n.pt"
device: 0                    # 0=GPU, cpu=CPU
workers: 0                   # Windows建议设为0

# ------------------------- 实验配置 -------------------------
project: "D:/ProjectAll/yolov8/logs"
name: "leaf_exp"             # 实验名称
exist_ok: False              # 是否允许覆盖同名实验

# ------------------------- 训练核心参数 -------------------------
epochs: 300
batch: 16
imgsz: 512

# ------------------------- 优化器参数 -------------------------
lr0: 0.001
lrf: 0.01                    # 最终学习率 = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005

# ------------------------- 数据增强配置 -------------------------
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.2
shear: 2.0
fliplr: 0.5
mosaic: 0.2                  # 官方支持参数
mixup: 0.0

# ------------------------- 学习率调度 -------------------------
cos_lr: True
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ------------------------- 正则化与早停 -------------------------
label_smoothing: 0.1
patience: 0                 # 早停观察窗口

# ------------------------- 高级选项 -------------------------
amp: True                   # 自动混合精度
verbose: False
plots: True
save_period: -1             # 禁用周期保存